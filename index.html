    <!-- Comprehensive Extension Error Suppression Script -->
    <script>
      // More aggressive extension error suppression
      (function () {
        "use strict";

        // Store original functions
        const originalAddEventListener = EventTarget.prototype.addEventListener;
        const originalConsoleError = console.error;
        const originalConsoleWarn = console.warn;

        // Extension detection patterns
        const extensionPatterns = [
          "extension://",
          "chrome-extension://",
          "moz-extension://",
          "safari-extension://",
          "vendor.js",
          "content.",
          "adobe",
          "acrobat",
          "colorzilla",
          "grammarly",
          "react-developer-tools",
          "mouse-pinch",
          "squarex",
          "wappalyzer",
          "urban-vpn",
          "coupert",
          "dimensions-inspect",
          "instant-data-scraper",
          "picture-in-picture",
          "text-blaze",
          "listener indicated an asynchronous response",
          "message channel closed",
          "runtime.lastError",
          "unchecked runtime",
          "Extension context invalidated",
        ];

        // Function to check if error is from extension
        function isExtensionError(message, source, stack) {
          const checkText =
            (message || "") + " " + (source || "") + " " + (stack || "");
          return extensionPatterns.some((pattern) =>
            checkText.toLowerCase().includes(pattern.toLowerCase())
          );
        }

        // Override console methods
        console.error = function (...args) {
          const message = args.join(" ");
          if (!isExtensionError(message)) {
            originalConsoleError.apply(console, args);
          }
        };

        console.warn = function (...args) {
          const message = args.join(" ");
          if (!isExtensionError(message)) {
            originalConsoleWarn.apply(console, args);
          }
        };

        // Global error handler
        window.addEventListener(
          "error",
          function (e) {
            if (isExtensionError(e.message, e.filename, e.error?.stack)) {
              e.preventDefault();
              e.stopPropagation();
              e.stopImmediatePropagation();
              return false;
            }
          },
          true
        );

        // Unhandled promise rejection handler
        window.addEventListener(
          "unhandledrejection",
          function (e) {
            const reason = e.reason?.toString() || "";
            if (isExtensionError(reason)) {
              e.preventDefault();
              e.stopPropagation();
              e.stopImmediatePropagation();
              return false;
            }
          },
          true
        );

        // Override addEventListener to prevent extension listeners
        EventTarget.prototype.addEventListener = function (
          type,
          listener,
          options
        ) {
          if (typeof listener === "function") {
            const originalListener = listener;
            listener = function (...args) {
              try {
                return originalListener.apply(this, args);
              } catch (error) {
                if (isExtensionError(error.message, "", error.stack)) {
                  return false;
                }
                throw error;
              }
            };
          }
          return originalAddEventListener.call(this, type, listener, options);
        };

        // Suppress all runtime.lastError
        if (typeof chrome !== "undefined" && chrome.runtime) {
          Object.defineProperty(chrome.runtime, "lastError", {
            get: function () {
              return undefined;
            },
            set: function () {
              return false;
            },
          });
        }

        // Prevent extension script injection detection
        Object.defineProperty(window, "chrome", {
          get: function () {
            return undefined;
          },
          set: function () {
            return false;
          },
        });
      })();
    </script>
